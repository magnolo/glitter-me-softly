<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<!-- Primary Meta -->
		<title>Glitter Me Softly</title>
		<meta name="description" content="A night of sparkle & love. 24.04.2026 at DAKS, Vienna. Dance like noone is watching." />

		<!-- Open Graph / Social Preview -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Glitter Me Softly" />
		<meta property="og:description" content="A night of sparkle & love. 24.04.2026 at DAKS, Vienna.  Dance like noone is watching." />
		<meta property="og:image" content="https://glitter-me-softly.skin/images/og-preview.webp" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Glitter Me Softly" />
		<meta name="twitter:description" content="A night of sparkle & love. 24.04.2026 at DAKS, Vienna." />
		<meta name="twitter:image" content="https://glitter-me-softly.skin/images/og-preview.webp" />

		<!-- Theme color for mobile browsers -->
		<meta name="theme-color" content="#0a0012" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
