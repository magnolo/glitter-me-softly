<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary Meta -->
    <title>Glitter Me Softly - Rave Birthday Party</title>
    <meta
      name="description"
      content="A night of sparkle & love. You're invited to the most glittery rave birthday party ever!"
    />

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glitter-me-softly.skin" />
    <meta property="og:title" content="Glitter Me Softly" />
    <meta
      property="og:description"
      content="A night of sparkle & love. You're invited to the most glittery rave birthday party ever!"
    />
    <meta
      property="og:image"
      content="https://glitter-me-softly.skin/images/og-preview.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_AT" />
    <meta property="og:site_name" content="Glitter Me Softly" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Glitter Me Softly" />
    <meta
      name="twitter:description"
      content="A night of sparkle & love. You're invited to the most glittery rave birthday party ever!."
    />
    <meta
      name="twitter:image"
      content="https://glitter-me-softly.skin/images/og-preview.webp"
    />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0012" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
